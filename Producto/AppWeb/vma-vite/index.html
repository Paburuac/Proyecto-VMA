<script>
  // Shim: window.catalogo para compatibilidad con código legacy
  Object.defineProperty(window, 'catalogo', {
    get() { return window._catalogoData || {}; },
    set(v) { window._catalogoData = v; },
    configurable: true,
  });

  // Mapeo de IDs legacy → rutas React (HashRouter)
  const _pageRoutes = {
    'page-inicio':           '/',
    'page-nosotros':         '/nosotros',
    'page-productos':        '/productos',
    'page-contacto':         '/contacto',
    'page-cotizacion':       '/cotizacion',

    'page-trabajador':       '/trabajador',
    'page-admin':            '/admin',
    'page-pago-resultado':   '/pago-resultado',
  };

  window.showPage = function(pageId) {
    const route = _pageRoutes[pageId];
    if (route) window.location.hash = '#' + route;
  };

  window.initMisCotizaciones = function() {};
  window.initPanelTrabajador = function() {};
  window.initAdmin           = function() {};
  window.openCart            = window.openCart  || function() {};
  window.closeCart           = window.closeCart || function() {};
  window.goToCategoria       = function(cat) {
    window.location.hash = '#/productos?categoria=' + encodeURIComponent(cat);
  };
</script>
